<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Archive</title>
    <meta name="description" content="Automated news aggregation archive — DevOps, Economy, Security, F1, MotoGP and more">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0d1117; --bg2: #161b22; --bg3: #1c2128; --border: #30363d;
            --text: #e6edf3; --text2: #8b949e; --text3: #484f58;
            --accent: #58a6ff; --green: #3fb950; --orange: #d29922; --red: #f85149;
            --code-bg: #151b23; --inline-bg: #21262d;
            --card-hover: #1f6feb08;
        }
        [data-theme="light"] {
            --bg: #ffffff; --bg2: #f6f8fa; --bg3: #eef1f5; --border: #d0d7de;
            --text: #1f2328; --text2: #656d76; --text3: #afb8c1;
            --accent: #0969da; --green: #1a7f37; --orange: #9a6700; --red: #cf222e;
            --code-bg: #f6f8fa; --inline-bg: #eef1f5;
            --card-hover: #ddf4ff44;
        }
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; font-size: 15px; transition: background 0.2s, color 0.2s; }
        .layout { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--bg2); border-right: 1px solid var(--border); position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; z-index: 100; transition: background 0.2s; }
        .sidebar-header { padding: 16px 20px; border-bottom: 1px solid var(--border); }
        .sidebar-header h2 { font-size: 16px; font-weight: 800; display: flex; align-items: center; gap: 6px; background: linear-gradient(135deg,var(--accent),var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .sidebar-header h2 svg { -webkit-text-fill-color: initial; -webkit-background-clip: unset; color: var(--accent); }
        .sidebar-header small { display: block; font-size: 11px; color: var(--text2); margin-top: 2px; }
        .sidebar-nav { padding: 8px 0; }
        .sidebar-cat { border-bottom: 1px solid var(--border); }
        .sidebar-cat-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 20px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text); transition: background 0.15s; }
        .sidebar-cat-header svg { width: 16px; height: 16px; vertical-align: -3px; margin-right: 6px; flex-shrink: 0; }
        .sidebar-cat-header:hover { background: var(--bg3); }
        .sidebar-cat-header .count { font-size: 11px; color: var(--text3); font-weight: 400; }
        .sidebar-cat-header .arrow { font-size: 10px; color: var(--text3); transition: transform 0.2s; }
        .sidebar-cat-header .arrow.open { transform: rotate(90deg); }
        .sidebar-cat-list { display: none; }
        .sidebar-cat-list.open { display: block; }
        .sidebar-cat-list a { display: block; padding: 4px 20px 4px 32px; color: var(--text2); text-decoration: none; font-size: 12.5px; border-left: 2px solid transparent; transition: all 0.15s; }
        .sidebar-cat-list a:hover { color: var(--text); background: var(--bg3); }
        .sidebar-cat-list a.active { color: var(--accent); border-left-color: var(--accent); background: var(--card-hover); font-weight: 600; }
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        .sidebar-toggle { display: none; position: fixed; top: 10px; left: 10px; z-index: 200; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; cursor: pointer; font-size: 18px; color: var(--text); line-height: 1; }
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
        .content { flex: 1; margin-left: 260px; padding: 32px 48px 48px; }
        @media (max-width: 900px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.open { display: block; }
            .sidebar-toggle { display: block; }
            .content { margin-left: 0; padding: 24px 20px; max-width: 100%; }
        }
        .theme-toggle { position: fixed; top: 10px; right: 12px; z-index: 300; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; transition: all 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .theme-toggle:hover { background: var(--bg3); }
        .home-header { text-align: center; padding: 0 0 32px; }
        .home-header h1 { font-size: 32px; font-weight: 800; background: linear-gradient(135deg,var(--accent),var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .home-header p { color: var(--text2); font-size: 14px; margin-top: 4px; }
        .categories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
        .cat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; cursor: pointer; transition: all 0.15s; }
        .cat-card:hover { border-color: var(--accent); background: var(--bg3); transform: translateY(-2px); }
        .cat-card .emoji { font-size: 24px; margin-bottom: 6px; display: block; }
        .cat-card h3 { font-size: 15px; font-weight: 600; margin: 0 0 4px; }
        .cat-card .desc { font-size: 12px; color: var(--text2); line-height: 1.4; }
        .cat-card .meta { font-size: 11px; color: var(--text3); margin-top: 8px; }
        .article-list { max-width: 800px; margin: 0 auto; }
        .article-list h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
        .article-list .back { display: inline-block; color: var(--accent); text-decoration: none; font-size: 13px; font-weight: 500; margin-bottom: 16px; cursor: pointer; }
        .article-list .back:hover { text-decoration: underline; }
        .article-item { display: block; padding: 12px 16px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; text-decoration: none; color: var(--text); transition: all 0.15s; }
        .article-item:hover { border-color: var(--accent); background: var(--bg3); }
        .article-item .date { font-size: 12px; color: var(--text3); font-weight: 500; }
        .article-item .title { font-size: 14px; font-weight: 600; margin-top: 2px; }
        .loading { display: flex; align-items: center; justify-content: center; padding: 80px 0; }
        .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-state { text-align: center; padding: 48px 0; color: var(--text2); }
        .error-state .emoji { font-size: 40px; margin-bottom: 12px; }
        .markdown-body { max-width: 960px; margin: 0 auto; }
        .markdown-body h1 { font-size: 28px; font-weight: 800; margin: 0 0 12px; line-height: 1.3; }
        .markdown-body h2 { font-size: 22px; font-weight: 700; margin: 32px 0 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
        .markdown-body h3 { font-size: 17px; font-weight: 600; margin: 24px 0 8px; }
        .markdown-body h4 { font-size: 15px; font-weight: 600; margin: 16px 0 6px; }
        .markdown-body p { margin: 0 0 12px; }
        .markdown-body a { color: var(--accent); text-decoration: none; }
        .markdown-body a:hover { text-decoration: underline; }
        .markdown-body ul, .markdown-body ol { margin: 8px 0 16px; padding-left: 24px; }
        .markdown-body li { margin: 3px 0; }
        .markdown-body hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
        .markdown-body strong { font-weight: 600; }
        .markdown-body blockquote { margin: 12px 0; padding: 8px 16px; border-left: 3px solid var(--accent); background: var(--bg3); border-radius: 0 6px 6px 0; }
        .markdown-body blockquote p { margin: 0; }
        .markdown-body code { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; background: var(--inline-bg); padding: 2px 6px; border-radius: 4px; font-size: 13px; }
        .markdown-body pre { margin: 12px 0 16px; padding: 14px 16px; background: var(--code-bg); border-radius: 8px; border: 1px solid var(--border); overflow-x: auto; }
        .markdown-body pre code { background: none; padding: 0; border-radius: 0; font-size: 13px; }
        .markdown-body table { width: 100%; border-collapse: collapse; margin: 12px 0 16px; font-size: 14px; }
        .markdown-body th, .markdown-body td { padding: 6px 12px; border: 1px solid var(--border); text-align: left; }
        .markdown-body th { background: var(--bg2); font-weight: 600; }
        .markdown-body tr:nth-child(even) { background: var(--bg3); }
        .markdown-body img { max-width: 100%; border-radius: 8px; margin: 12px 0; }
        .article-meta { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .article-meta .tag { display: inline-block; background: var(--bg3); color: var(--text2); font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 12px; border: 1px solid var(--border); }
        .article-meta .tag.blue { background: #1f6feb22; color: var(--accent); border-color: #1f6feb44; }
        .article-meta .tag.green { background: #10b98122; color: var(--green); border-color: #10b98144; }
        .article-meta .tag.orange { background: #d2992222; color: var(--orange); border-color: #d2992244; }
        .article-nav { display: flex; justify-content: space-between; margin-top: 32px; padding-top: 16px; border-top: 1px solid var(--border); }
        .article-nav a { color: var(--accent); text-decoration: none; font-size: 13px; font-weight: 500; }
        .article-nav a:hover { text-decoration: underline; }
        .article-nav .disabled { color: var(--text3); pointer-events: none; }
        /* Latest news section */
        .latest-section { margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
        .latest-section h2 { font-size: 18px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .latest-list { display: flex; flex-direction: column; gap: 6px; }
        .latest-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; text-decoration: none; color: var(--text); transition: all 0.15s; cursor: pointer; }
        .latest-item:hover { border-color: var(--accent); background: var(--bg3); }
        .latest-item .li-date { font-size: 11px; color: var(--text3); font-weight: 500; white-space: nowrap; min-width: 70px; }
        .latest-item .li-icon { display: flex; align-items: center; flex-shrink: 0; color: var(--accent); }
        .latest-item .li-icon svg { width: 16px; height: 16px; }
        .latest-item .li-cat { font-size: 11px; font-weight: 600; color: var(--accent); background: #1f6feb22; padding: 1px 8px; border-radius: 4px; white-space: nowrap; }
        .latest-item .li-title { font-size: 13.5px; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .latest-item .li-arrow { font-size: 12px; color: var(--text3); flex-shrink: 0; }
        .cat-card .icon-wrap { display: flex; align-items: center; margin-bottom: 6px; color: var(--accent); }
        .cat-card .icon-wrap svg { width: 22px; height: 22px; }
        /* Article item card */
        .article-item .excerpt { font-size: 12.5px; color: var(--text2); margin-top: 4px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .article-item .meta-info { font-size: 11px; color: var(--text3); margin-top: 6px; display: flex; gap: 12px; }
        /* Article list page heading */
        .article-list .cat-heading { font-size: 24px; font-weight: 700; margin: 0 0 4px; display: flex; align-items: center; gap: 8px; }
        .article-list .cat-desc { color: var(--text2); font-size: 13px; margin-bottom: 20px; }
        /* === Search === */
        .search-wrap { padding: 10px 12px; border-bottom: 1px solid var(--border); }
        .search-wrap input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px 8px 32px; color: var(--text); font-size: 13px; font-family: inherit; outline: none; transition: border 0.2s; }
        .search-wrap input:focus { border-color: var(--accent); }
        .search-wrap input::placeholder { color: var(--text3); }
        .search-wrap .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; color: var(--text3); pointer-events: none; }
        .search-wrap { position: relative; }
        .search-wrap .clear-btn { display: none; position: absolute; right: 22px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text3); cursor: pointer; font-size: 14px; padding: 4px; line-height: 1; }
        .search-wrap .clear-btn.visible { display: block; }
        .search-results { padding: 16px 0; }
        .search-results .sr-head { font-size: 13px; color: var(--text2); margin-bottom: 12px; }
        .search-results .sr-empty { text-align: center; color: var(--text3); font-size: 14px; padding: 32px 0; }
        .sr-item { display: block; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 8px; text-decoration: none; color: var(--text); cursor: pointer; transition: all 0.15s; }
        .sr-item:hover { border-color: var(--accent); background: var(--bg3); }
        .sr-item .sr-cat { font-size: 11px; font-weight: 600; color: var(--text2); display: flex; align-items: center; gap: 4px; margin-bottom: 4px; }
        .sr-item .sr-title { font-size: 14px; font-weight: 600; }
        .sr-item .sr-excerpt { font-size: 12.5px; color: var(--text2); margin-top: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .sr-item .sr-date { font-size: 11px; color: var(--text3); margin-top: 6px; }
        .sr-highlight { background: #58a6ff33; padding: 0 2px; border-radius: 2px; }
        /* === News Cards (article content) === */
        .news-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; margin-bottom: 14px; transition: border-color 0.15s; }
        .news-card:hover { border-color: var(--accent); }
        .news-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .news-num { font-size: 11px; font-weight: 700; color: var(--text3); background: var(--bg3); padding: 2px 8px; border-radius: 6px; flex-shrink: 0; }
        .news-icon { display: flex; align-items: center; flex-shrink: 0; color: var(--accent); }
        .news-icon svg { width: 18px; height: 18px; }
        .list-icon { display: inline-flex; align-items: center; vertical-align: -2px; margin-right: 4px; color: var(--accent); }
        .list-icon svg { width: 14px; height: 14px; }
        .news-card-title { font-size: 16px !important; font-weight: 700 !important; margin: 0 !important; padding: 0 !important; border: none !important; flex: 1; }
        .news-card-body { font-size: 14px; color: var(--text2); line-height: 1.65; }
        .news-card-body p { margin: 0 0 8px; }
        .news-card-body p:last-child { margin-bottom: 0; }
        .news-card-link { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
        .news-card-link a { display: inline-flex; align-items: center; gap: 6px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 6px 14px; font-size: 12.5px; font-weight: 500; color: var(--accent); text-decoration: none; transition: all 0.15s; }
        .news-card-link a:hover { background: #1f6feb22; border-color: var(--accent); text-decoration: none; }

        /* ─── Progress Bar ─── */
        .progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: linear-gradient(90deg, var(--accent), var(--green)); z-index: 999; width: 0%; transition: width 0.1s linear; }

        /* ─── Back to Top ─── */
        .back-to-top { position: fixed; bottom: 24px; right: 24px; z-index: 300; width: 40px; height: 40px; border-radius: 50%; background: var(--bg2); border: 1px solid var(--border); color: var(--text2); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: all 0.2s; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
        .back-to-top.visible { opacity: 1; pointer-events: auto; }
        .back-to-top:hover { background: var(--bg3); color: var(--accent); border-color: var(--accent); transform: translateY(-2px); }

        /* ─── Page Transitions ─── */
        .page-fade { animation: pageFadeIn 0.2s ease-out; }
        @keyframes pageFadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* ─── Breadcrumb ─── */
        .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--text3); margin-bottom: 16px; flex-wrap: wrap; }
        .breadcrumb a { color: var(--text2); text-decoration: none; cursor: pointer; transition: color 0.15s; }
        .breadcrumb a:hover { color: var(--accent); text-decoration: underline; }
        .breadcrumb .sep { color: var(--text3); font-size: 10px; }
        .breadcrumb .current { color: var(--text); font-weight: 500; }

        /* ─── Copy Code Button ─── */
        .code-wrap { position: relative; }
        .code-wrap .copy-btn { position: absolute; top: 8px; right: 8px; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: var(--text3); font-size: 11px; padding: 4px 10px; cursor: pointer; font-family: inherit; opacity: 0; transition: opacity 0.2s; }
        .code-wrap:hover .copy-btn { opacity: 1; }
        .code-wrap .copy-btn:hover { color: var(--accent); border-color: var(--accent); background: var(--bg2); }
        .code-wrap .copy-btn.copied { color: var(--green); border-color: var(--green); }

        /* ─── Load More ─── */
        .load-more-wrap { text-align: center; margin-top: 16px; }
        .load-more-btn { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 28px; color: var(--text2); font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; transition: all 0.15s; }
        .load-more-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--bg3); }
        .load-more-btn .count { color: var(--text3); font-weight: 400; }
        .load-more-btn:disabled { opacity: 0.4; pointer-events: none; }

        /* ─── Table of Contents ─── */
        .toc-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 20px; }
        .toc-wrap .toc-title { font-size: 12px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .toc-wrap .toc-list { list-style: none; padding: 0; margin: 0; }
        .toc-wrap .toc-list li { padding: 3px 0; }
        .toc-wrap .toc-list a { color: var(--text2); text-decoration: none; font-size: 13px; cursor: pointer; transition: color 0.15s; display: flex; align-items: center; gap: 6px; }
        .toc-wrap .toc-list a:hover { color: var(--accent); }
        .toc-wrap .toc-list .toc-num { font-size: 10px; font-weight: 700; color: var(--text3); background: var(--bg3); padding: 1px 6px; border-radius: 4px; flex-shrink: 0; }
        .toc-wrap .toc-list .toc-h3 { padding-left: 20px; }
        .toc-wrap .toc-list .toc-h3 a { font-size: 12.5px; }

        /* ─── Image Lightbox ─── */
        .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.25s; cursor: zoom-out; }
        .lightbox.open { opacity: 1; pointer-events: auto; }
        .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; box-shadow: 0 8px 40px rgba(0,0,0,0.5); transform: scale(0.9); transition: transform 0.25s; }
        .lightbox.open img { transform: scale(1); }
        .lightbox .lb-close { position: absolute; top: 16px; right: 20px; font-size: 28px; color: #fff; cursor: pointer; opacity: 0.7; transition: opacity 0.15s; background: none; border: none; font-family: inherit; }
        .lightbox .lb-close:hover { opacity: 1; }

        /* Article image clickable */
        .markdown-body img { cursor: zoom-in; }

        /* ─── Category badge on home ─── */
        .cat-card .meta .count-badge { display: inline-block; background: var(--accent); color: #fff; font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 10px; margin-left: 4px; }
    </style>
</head>
<body>
    <div class="progress-bar" id="progressBar"></div>
    <button class="back-to-top" id="backToTop" aria-label="Back to top">↑</button>
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">☰</button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;margin-right:4px"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9a2 2 0 0 1 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/></svg> News Archive</h2>
                <small id="headerInfo">Automated news aggregation</small>
            </div>
            <div class="search-wrap">
                <span class="search-icon"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
                <input type="text" id="searchInput" placeholder="Search articles..." autocomplete="off">
                <button class="clear-btn" id="clearSearch" aria-label="Clear search">✕</button>
            </div>
            <nav class="sidebar-nav" id="sidebarNav"></nav>
        </aside>

        <main class="content" id="content">
            <div id="pageContent"></div>
        </main>
    </div>

    <div class="lightbox" id="lightbox">
        <button class="lb-close" id="lightboxClose">✕</button>
        <img id="lightboxImg" src="" alt="">
    </div>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>

    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0">
    </script>
    <script>
        let articles = {};
        let currentCat = null;
        let currentFile = null;
        let articleOrder = [];

        // Normalize article format: handle backward compat with old articles.json
        function normalizeArticle(item) {
            if (typeof item === 'string') {
                const dateStr = item.replace('.md', '').replace(/-/g, '/');
                return { file: item, title: dateStr, excerpt: '', count: 0 };
            }
            return item;
        }

        function stripEmoji(text) {
            return text
                .replace(/^\d+[.)]\s*/, '')
                .replace(/[\p{Extended_Pictographic}\uFE0F]+/gu, '')
                .replace(/\s+/g, ' ')
                .trim();
        }

        const categoryOrder = ['devops', 'baremetal', 'selfhosted', 'ekonomi', 'k8s-security', 'tech-foundations'];

        const icons = {
            devops: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>',
            baremetal: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="2" y1="20" x2="22" y2="20"/></svg>',
            selfhosted: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="12" x2="2" y2="12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/><line x1="6" y1="16" x2="6.01" y2="16"/><line x1="10" y1="16" x2="10.01" y2="16"/></svg>',
            ekonomi: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 17 16.5 10.5 13 14 8 6 2 12"/><polyline points="16 17 22 17 22 11"/></svg>',
            'k8s-security': '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',
            'tech-foundations': '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>',
        };

        const categories = {
            baremetal: { icon: icons.baremetal, name: 'Bare Metal', desc: 'Bare-metal server & hardware news' },
            devops: { icon: icons.devops, name: 'DevOps', desc: 'DevOps, SRE & Cloud Engineering news' },
            selfhosted: { icon: icons.selfhosted, name: 'Self Hosted', desc: 'Self-hosted tools & applications' },
            ekonomi: { icon: icons.ekonomi, name: 'Ekonomi', desc: 'Indonesian & Global Economy updates' },
            'k8s-security': { icon: icons['k8s-security'], name: 'K8s Security', desc: 'Kubernetes Security briefings' },
            'tech-foundations': { icon: icons['tech-foundations'], name: 'Tech Foundations', desc: 'CNCF, Apache, Linux & OpenInfra updates' },
        };

        async function init() {
            // Fetch available articles from each category
            const promises = categoryOrder.map(async (cat) => {
                try {
                    const resp = await fetch(`${cat}/?t=${Date.now()}`, { method: 'HEAD' });
                    // We can't list files via HTTP, so we'll try known patterns
                    // Instead, use GitHub API or try common dates
                    articles[cat] = await discoverArticles(cat);
                } catch (e) {
                    articles[cat] = [];
                }
            });
            await Promise.allSettled(promises);
            
            buildSearchIndex();
            renderSidebar();
            
            // Check hash routing
            const hash = location.hash.slice(1);
            if (hash) {
                const searchMatch = hash.match(/^\/search\?q=(.+)$/i);
                if (searchMatch) {
                    const q = decodeURIComponent(searchMatch[1]);
                    document.getElementById('searchInput').value = q;
                    performSearch(q);
                    return;
                }
                const parts = hash.split('/');
                if (parts.length >= 2 && categories[parts[0]]) {
                    showCategory(parts[0]);
                    if (parts[1]) {
                        loadArticle(parts[0], parts[1]);
                    }
                    return;
                }
            }
            showHome();
        }

        async function discoverArticles(cat) {
            // Try fetching a manifest/index file first
            try {
                const resp = await fetch(`articles.json?t=${Date.now()}`);
                if (resp.ok) {
                    const data = await resp.json();
                    if (data[cat]) return data[cat].map(normalizeArticle).sort((a,b) => b.file.localeCompare(a.file));
                }
            } catch(e) {}

            // Fallback: generate from known articles (will be updated on each cron run)
            // The SPA will dynamically update as new articles are pushed
            return [];
        }

        function renderSidebar() {
            const nav = document.getElementById('sidebarNav');
            nav.innerHTML = '<div class="sidebar-cat"><div class="sidebar-cat-header" onclick="showHome()" style="cursor:pointer;border-bottom:1px solid var(--border);margin-bottom:4px"><span><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> Home</span></div></div>';
            
            categoryOrder.forEach(cat => {
                const info = categories[cat];
                const list = articles[cat] || [];
                const div = document.createElement('div');
                div.className = 'sidebar-cat';
                div.innerHTML = `
                    <div class="sidebar-cat-header" onclick="toggleCat('${cat}')">
                        <span>${info.icon} ${info.name}</span>
                        <span class="count">${list.length}</span>
                        <span class="arrow">▶</span>
                    </div>
                    <div class="sidebar-cat-list" id="catlist-${cat}"></div>
                `;
                nav.appendChild(div);

                const listDiv = div.querySelector('.sidebar-cat-list');
                list.forEach(item => {
                    const file = item.file;
                    const a = document.createElement('a');
                    a.href = `#/${cat}/${file}`;
                    // Format date: remove .md extension and show nicely
                    const display = item.title || file.replace('.md', '').replace(/-/g, '/');
                    const cleanTitle = stripEmoji(display);
                    a.innerHTML = `${info.icon} ${cleanTitle}`;
                    a.dataset.cat = cat;
                    a.dataset.file = file;
                    a.onclick = (e) => {
                        e.preventDefault();
                        showCategory(cat);
                        loadArticle(cat, file);
                        if (window.innerWidth <= 900) closeSidebar();
                    };
                    listDiv.appendChild(a);
                });

                // Auto-open if has articles
                if (list.length > 0) {
                    setTimeout(() => {
                        listDiv.classList.add('open');
                        div.querySelector('.arrow').classList.add('open');
                    }, 100);
                }
            });
        }

        function toggleCat(cat) {
            const list = document.getElementById(`catlist-${cat}`);
            const arrow = list.parentElement.querySelector('.arrow');
            list.classList.toggle('open');
            arrow.classList.toggle('open');
        }

        function getLatestPerCategory() {
            const result = [];
            categoryOrder.forEach(cat => {
                const list = articles[cat] || [];
                if (list.length > 0) {
                    const sorted = [...list].sort((a, b) => b.file.localeCompare(a.file));
                    const item = sorted[0];
                    result.push({ cat, item, dateStr: item.file.replace('.md', '') });
                }
            });
            return result;
        }

        function showHome() {
            currentCat = null;
            currentFile = null;
            const c = document.getElementById('pageContent');
            
            const latest = getLatestPerCategory();
            
            let html = `
                <div class="home-header">
                    <h1><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-4px;margin-right:6px"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9a2 2 0 0 1 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/></svg> News Archive</h1>
                    <p>Automated news aggregation — powered by Hermes Agent</p>
                </div>
            `;

            // Latest News section — one per category
            if (latest.length > 0) {
                html += `<div class="latest-section"><h2>🔥 Latest News</h2><div class="latest-list">`;
                latest.forEach(({ cat, item, dateStr }) => {
                    const info = categories[cat];
                    const displayDate = dateStr.replace(/-/g, '/');
                    const title = stripEmoji(item.title) || `${info.name} — ${displayDate}`;
                    html += `
                        <div class="latest-item" onclick="showCategory('${cat}'); loadArticle('${cat}', '${item.file}');">
                            <span class="li-icon">${info.icon}</span>
                            <span class="li-cat">${info.name}</span>
                            <span class="li-date">${displayDate}</span>
                            <span class="li-title">${title}</span>
                            <span class="li-arrow">→</span>
                        </div>
                    `;
                });
                html += `</div></div>`;
            }

            html += `<div class="categories-grid">`;
            let total = 0;
            categoryOrder.forEach(cat => {
                const info = categories[cat];
                const count = (articles[cat] || []).length;
                total += count;
                html += `
                    <div class="cat-card" onclick="showCategory('${cat}')">
                        <span class="icon-wrap">${info.icon}</span>
                        <h3>${info.name}</h3>
                        <div class="desc">${info.desc}</div>
                        <div class="meta">${count} article${count !== 1 ? 's' : ''}</div>
                    </div>
                `;
            });
            html += `</div>`;
            if (total === 0) {
                html += `<p style="text-align:center;color:var(--text2);margin-top:32px;font-size:14px">No articles loaded yet. Make sure articles.json exists in the repo root.</p>`;
            }
            c.innerHTML = html;

            // Count badges on home page cards
            categoryOrder.forEach(cat => {
                const count = (articles[cat] || []).length;
                const idx = categoryOrder.indexOf(cat) + 1;
                const badge = document.querySelector(`.cat-card:nth-child(${idx}) .meta`);
                if (badge && count > 0) {
                    badge.innerHTML += ` <span class="count-badge">${count}</span>`;
                }
            });

            document.querySelectorAll('.sidebar-cat-list a').forEach(a => a.classList.remove('active'));
            history.replaceState(null, '', '#');
            c.classList.add('page-fade');
        }

        async function showCategory(cat) {
            currentCat = cat;
            const info = categories[cat];
            const list = articles[cat] || [];
            const c = document.getElementById('pageContent');

            if (list.length === 0) {
                // Try to discover articles on demand
                await discoverArticlesOnDemand(cat);
                const refreshed = articles[cat] || [];
                if (refreshed.length === 0) {
                    c.innerHTML = `
                        <div class="article-list">
                            <a class="back" onclick="showHome()">← Back to categories</a>
                            <h2>${info.icon} ${info.name}</h2>
                            <div class="error-state">
                                <div class="emoji">📭</div>
                                <h3>No articles found</h3>
                                <p>No articles available for this category yet.</p>
                            </div>
                        </div>
                    `;
                    return;
                }
            }

            c.innerHTML = `
                <div class="article-list">
                    <a class="back" onclick="showHome()">← Back to categories</a>
                    <h2 class="cat-heading">${info.icon} ${info.name}</h2>
                    <p class="cat-desc">${info.desc}</p>
                    <div id="articleItems"></div>
                </div>
            `;

            const itemsDiv = document.getElementById('articleItems');
            const sorted = [...(articles[cat] || [])];
            sorted.forEach(item => {
                const file = item.file;
                const displayDate = file.replace('.md', '').replace(/-/g, '/');
                const title = stripEmoji(item.title) || `${info.name} — ${displayDate}`;
                const excerpt = item.excerpt || '';
                const a = document.createElement('a');
                a.className = 'article-item';
                a.href = `#/${cat}/${file}`;
                a.innerHTML = `
                    <div class="date">📅 ${displayDate}</div>
                    <div class="title"><span class="list-icon">${info.icon}</span> ${title}</div>
                    ${excerpt ? `<div class="excerpt">${excerpt}</div>` : ''}
                    <div class="meta-info">${item.count ? `${item.count} article${item.count > 1 ? 's' : ''}` : ''}</div>
                `;
                a.onclick = (e) => {
                    e.preventDefault();
                    loadArticle(cat, file);
                    if (window.innerWidth <= 900) closeSidebar();
                };
                itemsDiv.appendChild(a);
            });

            // Load More: show first 10, hide rest
            const LOAD_MORE_COUNT = 10;
            const allItems = itemsDiv.querySelectorAll('.article-item');
            if (allItems.length > LOAD_MORE_COUNT) {
                allItems.forEach((item, i) => { if (i >= LOAD_MORE_COUNT) item.style.display = 'none'; });
                const loadMore = document.createElement('div');
                loadMore.className = 'load-more-wrap';
                loadMore.innerHTML = `<button class="load-more-btn" onclick="(function(btn){var list=btn.closest('.article-list').querySelector('#articleItems');list.querySelectorAll('.article-item[style*=\"display:none\"]').forEach(function(el){el.style.display=''});btn.parentElement.innerHTML='<span style=\"color:var(--text3);font-size:13px\">Showing all ${allItems.length} articles</span>';})(this)">Show more <span class="count">(${allItems.length - LOAD_MORE_COUNT} remaining)</span></button>`;
                itemsDiv.parentElement.appendChild(loadMore);
            }

            document.querySelectorAll('.sidebar-cat-list a').forEach(a => a.classList.remove('active'));
            document.querySelector(`.sidebar-cat-list a[data-cat="${cat}"]`)?.classList.add('active');
            history.replaceState(null, '', `#/${cat}`);
            c.classList.add('page-fade');
        }

        async function discoverArticlesOnDemand(cat) {
            const resp = await fetch(`articles.json?t=${Date.now()}`);
            if (resp.ok) {
                const data = await resp.json();
                if (data[cat]) {
                    articles[cat] = data[cat].map(normalizeArticle);
                    updateSidebarCounts();
                    return;
                }
            }
            // Try direct fetch of common date patterns
            const today = new Date();
            const found = [];
            for (let i = 0; i < 14; i++) {
                const d = new Date(today);
                d.setDate(d.getDate() - i);
                const dateStr = d.toISOString().slice(0, 10);
                try {
                    const r = await fetch(`${cat}/${dateStr}.md`);
                    if (r.ok) found.push(`${dateStr}.md`);
                } catch(e) {}
            }
            if (found.length > 0) {
                articles[cat] = found.sort().reverse().map(f => ({file: f, title: f.replace('.md','').replace(/-/g,'/'), excerpt: '', count: 0}));
                updateSidebarCounts();
            }
        }

        function updateSidebarCounts() {
            categoryOrder.forEach(cat => {
                const headers = document.querySelectorAll('.sidebar-cat-header');
                // Update counts by re-rendering sidebar
            });
            renderSidebar();
        }

        async function loadArticle(cat, file) {
            currentFile = file;
            const c = document.getElementById('pageContent');
            c.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

            try {
                const resp = await fetch(`${cat}/${file}?t=${Date.now()}`);
                if (!resp.ok) throw new Error('Not found');
                const md = await resp.text();
                const cleanMd = md.replace(/^---[\s\S]*?---\n*/, '');
                const rendered = marked.parse(cleanMd);
                const enhanced = enhanceArticleContent(rendered, cat);
                const display = file.replace('.md', '').replace(/-/g, '/');
                const info = categories[cat];

                c.innerHTML = `
                    <div class="markdown-body page-fade">
                        <div class="breadcrumb">
                            <a onclick="showHome()">🏠 Home</a>
                            <span class="sep">›</span>
                            <a onclick="showCategory('${cat}')">${info.icon} ${info.name}</a>
                            <span class="sep">›</span>
                            <span class="current">${display}</span>
                        </div>
                        <div class="article-meta">
                            <span class="tag blue">${info.icon} ${info.name}</span>
                            <span class="tag green">📅 ${display}</span>
                        </div>
                        <div id="articleToc"></div>
                        <div id="articleBody">${enhanced}</div>
                        <div class="article-nav">
                            <a id="prevArticle" href="#">← Previous</a>
                            <a href="#" onclick="showCategory('${cat}'); return false;">↑ Back to list</a>
                            <a id="nextArticle" href="#">Next →</a>
                        </div>
                    </div>
                `;

                // Previous/Next navigation
                const list = articles[cat] || [];
                const sorted = [...list].sort((a, b) => a.file.localeCompare(b.file));
                const idx = sorted.findIndex(item => item.file === file);
                const prev = document.getElementById('prevArticle');
                const next = document.getElementById('nextArticle');
                if (idx > 0) {
                    const prevFile = sorted[idx - 1].file;
                    prev.href = `#/${cat}/${prevFile}`;
                    prev.onclick = (e) => { e.preventDefault(); loadArticle(cat, prevFile); };
                } else {
                    prev.classList.add('disabled');
                    prev.onclick = (e) => e.preventDefault();
                }
                if (idx < sorted.length - 1) {
                    const nextFile = sorted[idx + 1].file;
                    next.href = `#/${cat}/${nextFile}`;
                    next.onclick = (e) => { e.preventDefault(); loadArticle(cat, nextFile); };
                } else {
                    next.classList.add('disabled');
                    next.onclick = (e) => e.preventDefault();
                }

                // Update active in sidebar
                document.querySelectorAll('.sidebar-cat-list a').forEach(a => {
                    a.classList.toggle('active', a.dataset.cat === cat && a.dataset.file === file);
                });

                history.replaceState(null, '', `#/${cat}/${file}`);
                window.scrollTo(0, 0);

                // Generate Table of Contents
                generateTOC();

                // Add copy buttons to code blocks
                addCopyButtons();

                // Image lightbox
                document.querySelectorAll('.markdown-body img').forEach(img => {
                    img.addEventListener('click', function() {
                        document.getElementById('lightboxImg').src = this.src;
                        document.getElementById('lightbox').classList.add('open');
                    });
                });

                // Page fade
                c.classList.add('page-fade');

            } catch (e) {
                c.innerHTML = `
                    <div class="error-state">
                        <div class="emoji">🔍</div>
                        <h3>Article not found</h3>
                        <p>Could not load <code>${cat}/${file}</code></p>
                        <p><a href="#" onclick="showCategory('${cat}'); return false;">← Back to ${categories[cat]?.name || cat}</a></p>
                    </div>
                `;
            }
        }

        /* ──────────── Search ──────────── */
        let fuse = null;
        let searchTimeout = null;

        function buildSearchIndex() {
            const flat = [];
            categoryOrder.forEach(cat => {
                (articles[cat] || []).forEach(item => {
                    const info = categories[cat];
                    flat.push({
                        cat, file: item.file,
                        title: stripEmoji(item.title || item.file.replace('.md','').replace(/-/g,'/')),
                        excerpt: item.excerpt || '',
                        count: item.count || 0,
                        categoryIcon: info.icon,
                        categoryName: info.name,
                        dateStr: item.file.replace('.md','')
                    });
                });
            });
            fuse = new Fuse(flat, {
                keys: ['title', 'excerpt', 'categoryName'],
                threshold: 0.35,
                includeScore: true,
                minMatchCharLength: 2
            });
        }

        function performSearch(query) {
            const c = document.getElementById('pageContent');
            if (!query || query.length < 2) {
                showHome();
                return;
            }

            currentCat = null;
            currentFile = null;
            history.replaceState(null, '', `#/search?q=${encodeURIComponent(query)}`);

            if (!fuse) buildSearchIndex();
            const results = fuse.search(query);

            c.innerHTML = `<div class="search-results"></div>`;
            const sr = c.querySelector('.search-results');

            if (results.length === 0) {
                sr.innerHTML = `<div class="sr-head">🔍 0 results for "<strong>${escapeHtml(query)}</strong>"</div>
                    <div class="sr-empty">No articles match your search. Try different keywords.</div>`;
                return;
            }

            let html = `<div class="sr-head">🔍 ${results.length} result${results.length > 1 ? 's' : ''} for "<strong>${escapeHtml(query)}</strong>"</div>`;
            results.forEach(r => {
                const { cat, file, title, excerpt, dateStr, categoryIcon, categoryName } = r.item;
                const displayDate = dateStr.replace(/-/g, '/');
                const hlTitle = highlightMatch(title, query);
                const hlExcerpt = highlightMatch(excerpt, query);
                html += `
                    <div class="sr-item" onclick="showCategory('${cat}'); loadArticle('${cat}', '${file}');">
                        <div class="sr-cat">${categoryIcon} ${categoryName}</div>
                        <div class="sr-title">${hlTitle}</div>
                        ${excerpt ? `<div class="sr-excerpt">${hlExcerpt}</div>` : ''}
                        <div class="sr-date">📅 ${displayDate}</div>
                    </div>`;
            });
            sr.innerHTML = html;

            document.querySelectorAll('.sidebar-cat-list a').forEach(a => a.classList.remove('active'));
        }

        function highlightMatch(text, query) {
            if (!text) return '';
            const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            return text.replace(new RegExp(`(${escaped})`, 'gi'), '<span class="sr-highlight">$1</span>');
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        /* ──────────── News Cards ──────────── */
        function enhanceArticleContent(html, cat) {
            const catInfo = categories[cat];
            const catIcon = catInfo ? catInfo.icon : icons.devops;

            // Step 1: Wrap numbered h2 items in cards (DevOps, Baremetal, Selfhosted)
            let result = html.replace(
                /<h2[^>]*>(\d+)\.\s*(.*?)<\/h2>([\s\S]*?)(?=<h2[^>]*>|$)/gi,
                (match, num, titleText, content) => {
                    const cleanTitle = titleText.replace(/^[\p{Extended_Pictographic}\uFE0F\s]+/u, '').trim();
                    let bodyContent = content;
                    let linkHtml = '';
                    const linkMatch = bodyContent.match(
                        /<p>(?:🔗\s*)?<a\s[^>]*>.*?<\/a>\s*<\/p>\s*$/i
                    );
                    if (linkMatch) {
                        linkHtml = linkMatch[0];
                        bodyContent = bodyContent.slice(0, bodyContent.lastIndexOf(linkMatch[0]));
                    }
                    bodyContent = bodyContent.replace(/<hr>\s*$/i, '');

                    return `
                        <div class="news-card">
                            <div class="news-card-header">
                                <span class="news-num">#${num}</span>
                                <span class="news-icon">${catIcon}</span>
                                <h2 class="news-card-title">${cleanTitle}</h2>
                            </div>
                            <div class="news-card-body">${bodyContent}</div>
                            ${linkHtml ? `<div class="news-card-link">${linkHtml.replace(/^<p>|<\/p>$/g, '')}</div>` : ''}
                        </div>
                    `;
                }
            );

            // Step 2: Wrap h3 items in cards (K8s Security, Ekonomi, Tech Foundations)
            result = result.replace(
                /<h3[^>]*>([\s\S]*?)<\/h3>([\s\S]*?)(?=<h[23][^>]*>|$)/gi,
                (match, titleText, content) => {
                    const cleanTitle = titleText.replace(/^[\p{Extended_Pictographic}\uFE0F\s]+/u, '').trim();
                    let bodyContent = content;
                    bodyContent = bodyContent.replace(/<hr>\s*$/i, '');

                    return `
                        <div class="news-card">
                            <div class="news-card-header">
                                <span class="news-icon">${catIcon}</span>
                                <h3 class="news-card-title">${cleanTitle}</h3>
                            </div>
                            <div class="news-card-body">${bodyContent}</div>
                        </div>
                    `;
                }
            );

            return result;
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('open');
        }

        /* ─── Table of Contents ─── */
        function generateTOC() {
            const tocContainer = document.getElementById('articleToc');
            if (!tocContainer) return;
            const body = document.getElementById('articleBody');
            if (!body) return;
            const headings = body.querySelectorAll('h2, h3');
            if (headings.length < 3) { tocContainer.style.display = 'none'; return; }

            let html = '<div class="toc-wrap"><div class="toc-title">📋 Table of Contents</div><ul class="toc-list">';
            headings.forEach(h => {
                const text = h.textContent.trim();
                if (!text) return;
                const id = 'toc-' + Math.random().toString(36).slice(2, 8);
                h.id = id;
                const num = h.tagName === 'H2' ? '' : '<span class="toc-num">·</span>';
                const cls = h.tagName === 'H3' ? 'toc-h3' : '';
                html += `<li class="${cls}"><a onclick="document.getElementById('${id}').scrollIntoView({behavior:'smooth'});event.preventDefault()">${num} ${text}</a></li>`;
            });
            html += '</ul></div>';
            tocContainer.innerHTML = html;
        }

        /* ─── Copy Code Buttons ─── */
        function addCopyButtons() {
            document.querySelectorAll('.markdown-body pre').forEach(pre => {
                if (pre.parentElement.classList.contains('code-wrap')) return;
                const wrap = document.createElement('div');
                wrap.className = 'code-wrap';
                pre.parentNode.insertBefore(wrap, pre);
                wrap.appendChild(pre);
                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.textContent = 'Copy';
                btn.onclick = function() {
                    const code = this.parentElement.querySelector('code')?.textContent || this.parentElement.textContent;
                    navigator.clipboard.writeText(code.trim()).then(() => {
                        this.textContent = 'Copied!';
                        this.classList.add('copied');
                        setTimeout(() => { this.textContent = 'Copy'; this.classList.remove('copied'); }, 2000);
                    }).catch(() => {
                        this.textContent = 'Failed';
                    });
                };
                wrap.appendChild(btn);
            });
        }

        /* ─── Scroll Listener ─── */
        let scrollRAF = null;
        window.addEventListener('scroll', () => {
            if (scrollRAF) return;
            scrollRAF = requestAnimationFrame(() => {
                scrollRAF = null;
                const scrollTop = window.scrollY;
                const docHeight = document.documentElement.scrollHeight - window.innerHeight;
                const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
                const bar = document.getElementById('progressBar');
                if (bar) bar.style.width = Math.min(progress, 100) + '%';
                const btt = document.getElementById('backToTop');
                if (btt) btt.classList.toggle('visible', scrollTop > 400);
            });
        });

        /* ─── Back to Top ─── */
        document.getElementById('backToTop')?.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        /* ─── Lightbox ─── */
        document.getElementById('lightbox')?.addEventListener('click', function(e) {
            if (e.target === this || e.target.id === 'lightboxClose') {
                this.classList.remove('open');
            }
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') document.getElementById('lightbox')?.classList.remove('open');
        });

        // Theme toggle
        document.getElementById('themeToggle').addEventListener('click', () => {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('themeToggle').textContent = isDark ? '☀️' : '🌙';
        });

        // Sidebar toggle
        document.getElementById('sidebarToggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('open');
        });
        document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);

        // Search
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const q = e.target.value.trim();
            document.getElementById('clearSearch').classList.toggle('visible', q.length > 0);
            searchTimeout = setTimeout(() => performSearch(q), 250);
        });
        document.getElementById('searchInput').addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                e.target.value = '';
                document.getElementById('clearSearch').classList.remove('visible');
                showHome();
                e.target.blur();
            }
        });
        document.getElementById('clearSearch').addEventListener('click', () => {
            document.getElementById('searchInput').value = '';
            document.getElementById('clearSearch').classList.remove('visible');
            showHome();
            document.getElementById('searchInput').focus();
        });

        // Hash routing
        window.addEventListener('hashchange', () => {
            const hash = location.hash.slice(1);
            if (!hash) { showHome(); return; }
            const searchMatch = hash.match(/^\/search\?q=(.+)$/i);
            if (searchMatch) {
                const q = decodeURIComponent(searchMatch[1]);
                document.getElementById('searchInput').value = q;
                performSearch(q);
                return;
            }
            const parts = hash.split('/');
            if (parts.length >= 1 && categories[parts[0]]) {
                showCategory(parts[0]);
                if (parts[1]) loadArticle(parts[0], parts[1]);
            } else {
                showHome();
            }
        });

        // Init
        marked.setOptions({ breaks: true, gfm: true });
        init();
    </script>
</body>
</html>
